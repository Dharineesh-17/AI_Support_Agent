version: "3.9"

services:
  mysql:
    image: mysql:9.0
    container_name: customer_agent_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: customer_agent_db
      MYSQL_USER: agent_user
      MYSQL_PASSWORD: agent_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --max-connections=200
      --slow-query-log=1
      --slow-query-log-file=/var/log/mysql/slow.log
      --long-query-time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "agent_user", "-pagent_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - agent_network

volumes:
  mysql_data:
    driver: local

networks:
  agent_network:
    driver: bridge
